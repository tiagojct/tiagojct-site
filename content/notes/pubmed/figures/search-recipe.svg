<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" role="img" aria-label="A reproducible PubMed search recipe in eight steps: clarify question with PICO, look up MeSH terms, build a block per concept, combine blocks with AND, apply filters, save to MyNCBI, schedule a weekly email alert, and export hits to Zotero." font-family="Atkinson Hyperlegible Next, sans-serif">
  <defs>
    <marker id="arrR" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#835A49"/>
    </marker>
  </defs>

  <text x="450" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#0D2F42">A reproducible PubMed search, in eight steps</text>

  <!-- Row 1 -->
  <!-- 1 PICO -->
  <rect x="20" y="50" width="190" height="80" rx="6" fill="#EAE1D7" stroke="#0082B1" stroke-width="1.5"/>
  <text x="115" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2F42">1. Frame as PICO</text>
  <text x="115" y="90" text-anchor="middle" font-size="9.5" fill="#0D2F42">P · I · C · O</text>
  <text x="115" y="106" text-anchor="middle" font-size="9" fill="#76716B">Population, Intervention,</text>
  <text x="115" y="118" text-anchor="middle" font-size="9" fill="#76716B">Comparator, Outcome</text>

  <line x1="210" y1="90" x2="245" y2="90" stroke="#835A49" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- 2 MeSH lookup -->
  <rect x="245" y="50" width="190" height="80" rx="6" fill="#EAE1D7" stroke="#0082B1" stroke-width="1.5"/>
  <text x="340" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2F42">2. MeSH lookup</text>
  <text x="340" y="92" text-anchor="middle" font-size="9.5" fill="#0D2F42">MeSH Database</text>
  <text x="340" y="108" text-anchor="middle" font-size="9" fill="#76716B">canonical term per concept,</text>
  <text x="340" y="120" text-anchor="middle" font-size="9" fill="#76716B">note synonyms</text>

  <line x1="435" y1="90" x2="470" y2="90" stroke="#835A49" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- 3 Blocks -->
  <rect x="470" y="50" width="190" height="80" rx="6" fill="#EAE1D7" stroke="#0082B1" stroke-width="1.5"/>
  <text x="565" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2F42">3. Build blocks</text>
  <text x="565" y="92" text-anchor="middle" font-size="9" font-family="Geist Mono, monospace" fill="#835A49">("asthma"[MeSH] OR</text>
  <text x="565" y="105" text-anchor="middle" font-size="9" font-family="Geist Mono, monospace" fill="#835A49">"asthma"[tiab])</text>
  <text x="565" y="120" text-anchor="middle" font-size="9" fill="#76716B">one block per PICO concept</text>

  <line x1="660" y1="90" x2="695" y2="90" stroke="#835A49" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- 4 Combine -->
  <rect x="695" y="50" width="190" height="80" rx="6" fill="#EAE1D7" stroke="#0082B1" stroke-width="1.5"/>
  <text x="790" y="72" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2F42">4. Combine with AND</text>
  <text x="790" y="92" text-anchor="middle" font-size="9.5" fill="#0D2F42">P AND I AND C AND O</text>
  <text x="790" y="108" text-anchor="middle" font-size="9" fill="#76716B">Advanced Builder shows</text>
  <text x="790" y="120" text-anchor="middle" font-size="9" fill="#76716B">history; combine #1 AND #2</text>

  <!-- Down arrow -->
  <line x1="790" y1="130" x2="790" y2="165" stroke="#835A49" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- Row 2 reversed -->
  <!-- 5 Filters -->
  <rect x="695" y="170" width="190" height="80" rx="6" fill="#EAE1D7" stroke="#6A4A00" stroke-width="1.5"/>
  <text x="790" y="192" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2F42">5. Filters (sparingly)</text>
  <text x="790" y="210" text-anchor="middle" font-size="9.5" fill="#0D2F42">date · language · type</text>
  <text x="790" y="226" text-anchor="middle" font-size="9" fill="#76716B">RCT, SR, Practice Guideline.</text>
  <text x="790" y="238" text-anchor="middle" font-size="9" fill="#A83732">Filters can silently drop hits.</text>

  <line x1="695" y1="210" x2="660" y2="210" stroke="#835A49" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- 6 Save -->
  <rect x="470" y="170" width="190" height="80" rx="6" fill="#EAE1D7" stroke="#6A4A00" stroke-width="1.5"/>
  <text x="565" y="192" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2F42">6. Save to MyNCBI</text>
  <text x="565" y="210" text-anchor="middle" font-size="9.5" fill="#0D2F42">"Create alert"</text>
  <text x="565" y="226" text-anchor="middle" font-size="9" fill="#76716B">version-controls the query;</text>
  <text x="565" y="238" text-anchor="middle" font-size="9" fill="#76716B">re-run anytime</text>

  <line x1="470" y1="210" x2="435" y2="210" stroke="#835A49" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- 7 Alert -->
  <rect x="245" y="170" width="190" height="80" rx="6" fill="#EAE1D7" stroke="#6A4A00" stroke-width="1.5"/>
  <text x="340" y="192" text-anchor="middle" font-size="11" font-weight="700" fill="#0D2F42">7. Weekly email alert</text>
  <text x="340" y="210" text-anchor="middle" font-size="9.5" fill="#0D2F42">PubMed mails new hits</text>
  <text x="340" y="226" text-anchor="middle" font-size="9" fill="#76716B">leverage move — passive</text>
  <text x="340" y="238" text-anchor="middle" font-size="9" fill="#76716B">surveillance of the literature</text>

  <line x1="245" y1="210" x2="210" y2="210" stroke="#835A49" stroke-width="1.5" marker-end="url(#arrR)"/>

  <!-- 8 Export to Zotero -->
  <rect x="20" y="170" width="190" height="80" rx="6" fill="#177C55" stroke="none"/>
  <text x="115" y="194" text-anchor="middle" font-size="11" font-weight="700" fill="#FFFFFF">8. Send to Zotero</text>
  <text x="115" y="212" text-anchor="middle" font-size="9.5" fill="#FFFFFF">.nbib / .ris / Connector</text>
  <text x="115" y="228" text-anchor="middle" font-size="9" fill="#EAE1D7">references live in one place</text>
  <text x="115" y="240" text-anchor="middle" font-size="9" fill="#EAE1D7">with PDFs and notes</text>

  <!-- Bottom guidance band -->
  <rect x="20" y="290" width="865" height="150" rx="6" fill="#FAF6F1" stroke="#0082B1" stroke-width="1"/>
  <text x="40" y="312" font-size="11" font-weight="700" fill="#0D2F42">Heuristics</text>
  <text x="40" y="332" font-size="10" fill="#0D2F42">·  Start broad, then narrow. A query that returns zero hits is almost always wrong, not exhaustive.</text>
  <text x="40" y="348" font-size="10" fill="#0D2F42">·  Within a concept use OR; between concepts use AND. NOT only at the very end, and only if necessary.</text>
  <text x="40" y="364" font-size="10" fill="#0D2F42">·  Pair MeSH with text-word fallback (<tspan font-family="Geist Mono, monospace" fill="#835A49">[tiab]</tspan>) — MeSH indexing lags 6–12 months, recent papers are not yet tagged.</text>
  <text x="40" y="380" font-size="10" fill="#0D2F42">·  Paste the Search Details translation in your Methods; that is your reproducible search.</text>
  <text x="40" y="396" font-size="10" fill="#0D2F42">·  Re-running the saved query 6 months later finds the new evidence; the alert does it for you in the meantime.</text>
  <text x="40" y="412" font-size="10" fill="#0D2F42">·  Filters are not free: "Free full text" excludes paywalled landmark trials. Use sparingly and document.</text>
  <text x="40" y="428" font-size="10" fill="#0D2F42">·  When in doubt, run two versions: a precise (MeSH-only) and a sensitive (MeSH + tiab + synonyms). Compare counts.</text>
</svg>

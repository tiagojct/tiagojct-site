<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" role="img" aria-label="AI scouts versus PubMed as source of truth. AI tools (Elicit, Consensus, Undermind, Research Rabbit, scite) help with discovery, summarisation, and citation graph navigation; PubMed remains the verifiable source. Every AI-surfaced reference is checked against PubMed via Single Citation Matcher before being trusted." font-family="Atkinson Hyperlegible Next, sans-serif">
  <defs>
    <marker id="arrG" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#177C55"/>
    </marker>
    <marker id="arrK" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#835A49"/>
    </marker>
  </defs>

  <text x="450" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#0D2F42">AI scouts vs PubMed: who does what</text>

  <!-- Top lane: scouts -->
  <rect x="20" y="55" width="860" height="120" rx="8" fill="#FAF6F1" stroke="#0082B1" stroke-width="1"/>
  <text x="40" y="78" font-size="11" font-weight="700" fill="#0082B1">AI scouts — discovery, summary, graph walking</text>

  <!-- Tool boxes -->
  <rect x="40" y="92" width="150" height="68" rx="5" fill="#EAE1D7" stroke="#0082B1" stroke-width="1"/>
  <text x="115" y="110" text-anchor="middle" font-size="10" font-weight="700" fill="#0D2F42">Elicit</text>
  <text x="115" y="126" text-anchor="middle" font-size="9" fill="#76716B">extract findings tables</text>
  <text x="115" y="138" text-anchor="middle" font-size="9" fill="#76716B">across hundreds of papers</text>
  <text x="115" y="152" text-anchor="middle" font-size="9" fill="#76716B">from one prompt</text>

  <rect x="200" y="92" width="150" height="68" rx="5" fill="#EAE1D7" stroke="#0082B1" stroke-width="1"/>
  <text x="275" y="110" text-anchor="middle" font-size="10" font-weight="700" fill="#0D2F42">Consensus</text>
  <text x="275" y="126" text-anchor="middle" font-size="9" fill="#76716B">aggregates yes/no/mixed</text>
  <text x="275" y="138" text-anchor="middle" font-size="9" fill="#76716B">across studies for a</text>
  <text x="275" y="152" text-anchor="middle" font-size="9" fill="#76716B">specific question</text>

  <rect x="360" y="92" width="150" height="68" rx="5" fill="#EAE1D7" stroke="#0082B1" stroke-width="1"/>
  <text x="435" y="110" text-anchor="middle" font-size="10" font-weight="700" fill="#0D2F42">Undermind</text>
  <text x="435" y="126" text-anchor="middle" font-size="9" fill="#76716B">deep iterative search</text>
  <text x="435" y="138" text-anchor="middle" font-size="9" fill="#76716B">for hard or niche</text>
  <text x="435" y="152" text-anchor="middle" font-size="9" fill="#76716B">questions (minutes per run)</text>

  <rect x="520" y="92" width="150" height="68" rx="5" fill="#EAE1D7" stroke="#0082B1" stroke-width="1"/>
  <text x="595" y="110" text-anchor="middle" font-size="10" font-weight="700" fill="#0D2F42">Research Rabbit</text>
  <text x="595" y="126" text-anchor="middle" font-size="9" fill="#76716B">visualise citation graph</text>
  <text x="595" y="138" text-anchor="middle" font-size="9" fill="#76716B">around a seed paper —</text>
  <text x="595" y="152" text-anchor="middle" font-size="9" fill="#76716B">forward + backward</text>

  <rect x="680" y="92" width="180" height="68" rx="5" fill="#EAE1D7" stroke="#0082B1" stroke-width="1"/>
  <text x="770" y="110" text-anchor="middle" font-size="10" font-weight="700" fill="#0D2F42">scite</text>
  <text x="770" y="126" text-anchor="middle" font-size="9" fill="#76716B">classify citations as</text>
  <text x="770" y="138" text-anchor="middle" font-size="9" fill="#76716B">supporting, contrasting,</text>
  <text x="770" y="152" text-anchor="middle" font-size="9" fill="#76716B">or mentioning</text>

  <!-- Verification arrow -->
  <line x1="450" y1="180" x2="450" y2="215" stroke="#177C55" stroke-width="2" marker-end="url(#arrG)"/>
  <text x="465" y="200" font-size="10" font-style="italic" fill="#177C55">verify every hit</text>

  <!-- Bottom lane: PubMed -->
  <rect x="20" y="220" width="860" height="100" rx="8" fill="#FAF6F1" stroke="#177C55" stroke-width="1.5"/>
  <text x="40" y="243" font-size="11" font-weight="700" fill="#177C55">PubMed — source of truth</text>

  <rect x="40" y="255" width="240" height="50" rx="5" fill="#177C55"/>
  <text x="160" y="275" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">Single Citation Matcher</text>
  <text x="160" y="292" text-anchor="middle" font-size="9" fill="#EAE1D7">paste a half-remembered ref → PMID</text>

  <rect x="300" y="255" width="270" height="50" rx="5" fill="#177C55"/>
  <text x="435" y="275" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">PMID exists? Title matches?</text>
  <text x="435" y="292" text-anchor="middle" font-size="9" fill="#EAE1D7">if not, the citation is hallucinated</text>

  <rect x="590" y="255" width="270" height="50" rx="5" fill="#177C55"/>
  <text x="725" y="275" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">Export .nbib → Zotero</text>
  <text x="725" y="292" text-anchor="middle" font-size="9" fill="#EAE1D7">only verified references enter the library</text>

  <!-- Bottom rule -->
  <text x="450" y="345" text-anchor="middle" font-size="11" font-style="italic" fill="#A83732">Rule of thumb: AI tools surface candidates; PubMed validates them. Never cite a paper an LLM gave you without checking the PMID.</text>
  <text x="450" y="365" text-anchor="middle" font-size="9.5" fill="#76716B">LLMs (ChatGPT, Claude, Gemini) without a retrieval layer are particularly prone to inventing plausible-looking citations.</text>
</svg>
